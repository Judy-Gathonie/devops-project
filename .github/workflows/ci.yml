name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t devops-app .

    - name: Run container
      run: docker run -d -p 3000:3000 devops-app

    - name: Test endpoint
      run: curl http://localhost:3000/hello
      